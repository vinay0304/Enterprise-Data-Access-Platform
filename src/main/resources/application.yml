spring:
  application:
    name: enterprise-data-access-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/enterprise_data
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
